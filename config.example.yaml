#   enabled: true
#   budget_tokens: 4096

# MCP Server 可分别放在用户级 ~/.mycode/config.yaml 与本项目配置中。
# 项目级同名 Server 会整体覆盖用户级定义；不同名 Server 会合并保留。
mcp_servers:
  local-files:
    transport: stdio
    command: npx
    args:
      - -y
      - "@modelcontextprotocol/server-filesystem"
      - "${MCP_ROOT}"
    env:
      LOG_LEVEL: "${MCP_LOG_LEVEL}"

  company-tools:
    transport: http
    url: "https://${MCP_HOST}/mcp"
    headers:
      Authorization: "Bearer ${MCP_TOKEN}"

# stdio 继承启动 Mycode 的环境，env 覆盖同名变量。
# url、headers、args 和 env 支持完整或嵌入式 ${VAR}，未设置变量会阻止启动。
# Agent 中的名称为 <server>__<tool>；权限规则写作 company-tools__search(call)。
# HTTP 是 Streamable HTTP。当前只支持 text/structuredContent，不实现 Resources、
# Prompts、Sampling、健康检查、自动重连或动态重载。

# 权限配置与 Provider 配置分开存放：
#   用户级：~/.mycode/permissions.yaml
#   项目级：<workspace>/.mycode/permissions.yaml
#   本地级：<workspace>/.mycode/permissions.local.yaml
# 也可以用 --permission-mode strict|default|allow 覆盖本次进程。
# read_file、find_files、search_code 通过工作区校验后直接执行，不参与规则或审批。
# default 模式对受控工具使用方向键菜单，仅支持不同意、仅本次同意、本会话同意。
# 交互审批不会持久化；长期规则请手工写入 permissions.local.yaml。
